name: Daily News Crawl

on:
  schedule:
    - cron: '0 12 * * *' # Runs at 12:00 PM UTC (adjust as needed)
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install feedparser google-generativeai

    - name: Run researcher
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python researcher.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add news_data.js
        git diff-index --quiet HEAD || git commit -m "Automated daily news update"
        git push
