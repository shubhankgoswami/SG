<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stories</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main>
    <!-- Example story card: replicate for each story -->
    <article class="story-card">
      <h2 class="story-title">Story title</h2>

      <div class="story-snippet" id="snippet-1" aria-hidden="false">
        <p>
          Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin gravida
          pharetra felis, sed ullamcorper nibh volutpat sed. Integer euismod nisl
          non risus feugiat, sed faucibus ipsum tincidunt. Sed do eiusmod tempor
          incididunt ut labore et dolore magna aliqua. <!-- long story text -->
        </p>
      </div>

      <button class="read-more" aria-expanded="false" data-target="snippet-1">
        Read more
      </button>
    </article>
  </main>

  <script src="assets/js/script.js" defer></script>
</body>
</html>
